{% extends 'base.html' %}

{% block content %}
<div class="jumbotron text-center">
    <h1 class="display-4">Welcome to Hospital Management System</h1>
    <p class="lead">Book appointments with doctors easily and efficiently</p>
    <hr class="my-4">
    {% if not user.is_authenticated %}
        <p>Get started by creating an account</p>
        <a class="btn btn-primary btn-lg" href="{% url 'signup_choice' %}" role="button">Sign Up</a>
        <a class="btn btn-secondary btn-lg" href="{% url 'login' %}" role="button">Login</a>
    {% endif %}
</div>
{% endblock %}
